<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT // Performance Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">VALORANT // PERFORMANCE</div>
            <p class="subtitle">Custom Curated Match Assessment Engine</p>
        </header>

        <main>
            <section class="input-card">

                <div class="input-row">
                    <div class="input-group flex-3">
                        <label>RIOT ID / USERNAME</label>
                        <input type="text" id="username" placeholder="e.g., TenZ">
                    </div>
                    <div class="input-group flex-1">
                        <label>TAG</label>
                        <input type="text" id="tag" placeholder="e.g., NA1">
                    </div>
                </div>
                <button id="calcBtn">ANALYSE MATCH PERFORMANCE</button>
            </section>

            <section id="errorState" class="error-card hidden"></section>

            <section id="resultState" class="result-container hidden">
                <div id="matchList"></div>
                <button id="loadMoreBtn" class="hidden" style="margin-top: 20px;">LOAD MORE MATCHES</button>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
