<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Valorant Performance Engine — Custom curated match assessment scoring for competitive players.">
    <title>VALORANT // Performance Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <header>
            <div class="header-brand">
                <div class="logo">// PERF ENGINE</div>
                <p class="subtitle">Custom Curated Match Assessment Engine</p>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <span class="toggle-icon-moon">🌙</span>
                <div class="toggle-track">
                    <div class="toggle-dot"></div>
                </div>
                <span class="toggle-icon-sun">☀️</span>
            </button>
        </header>

        <main>
            <section class="input-card">
                <div class="input-row">
                    <div class="input-group flex-3">
                        <label for="username">Riot ID / Username</label>
                        <input type="text" id="username" placeholder="e.g., TenZ" autocomplete="off" spellcheck="false">
                    </div>
                    <div class="input-group flex-1">
                        <label for="tag">Tag</label>
                        <input type="text" id="tag" placeholder="NA1" autocomplete="off" spellcheck="false">
                    </div>
                </div>
                <button id="calcBtn"><span>Analyse Match Performance</span></button>
            </section>

            <section id="errorState" class="error-card hidden"></section>

            <section id="performanceState" class="performance-card hidden">
                <div class="perf-header">Recent Performance (Last 20 Matches)</div>
                <div class="perf-body">
                    <div class="perf-graphic">
                        <svg class="circular-chart" viewBox="0 0 36 36">
                            <path class="circle-bg"
                                d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <path class="circle" id="perfCircle"
                                stroke-dasharray="0, 100"
                                d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <text x="18" y="20.35" class="percentage" id="perfScoreText">0</text>
                            <text x="18" y="24" class="perf-label">AVG SCORE</text>
                        </svg>
                    </div>
                    <div class="perf-stats">
                        <div class="perf-stat-box">
                            <span class="stat-val" id="perfAcs">0</span>
                            <span class="stat-lbl">AVG ACS</span>
                        </div>
                        <div class="perf-stat-box">
                            <span class="stat-val" id="perfKda">0/0/0</span>
                            <span class="stat-lbl">AVG K/D/A</span>
                        </div>
                        <div class="perf-stat-box">
                            <span class="stat-val" id="perfClutch">0</span>
                            <span class="stat-lbl">CLUTCHES</span>
                        </div>
                        <div class="perf-stat-box">
                            <span class="stat-val" id="perfFbfd">0 / 0</span>
                            <span class="stat-lbl">FB / FD</span>
                        </div>
                    </div>
                </div>
            </section>

            <section id="resultState" class="result-container hidden">
                <div id="matchList"></div>
                <button id="loadMoreBtn" class="hidden"><span>Load More Matches</span></button>
            </section>
        </main>

    </div>
    <script src="app.js"></script>
</body>
</html>
