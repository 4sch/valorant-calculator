<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT // Performance Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">VALORANT // PERFORMANCE</div>
            <p class="subtitle">Custom Curated Match Assessment Engine</p>
        </header>

        <main>
            <section class="input-card">
                <div class="input-group">
                    <label>MATCH ID</label>
                    <input type="text" id="matchId" placeholder="e.g., a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d">
                </div>
                <div class="input-row">
                    <div class="input-group flex-3">
                        <label>RIOT ID / USERNAME</label>
                        <input type="text" id="username" placeholder="e.g., TenZ">
                    </div>
                    <div class="input-group flex-1">
                        <label>TAG</label>
                        <input type="text" id="tag" placeholder="e.g., NA1">
                    </div>
                </div>
                <button id="calcBtn">ANALYSE MATCH PERFORMANCE</button>
            </section>

            <section id="errorState" class="error-card hidden"></section>

            <section id="resultState" class="result-container hidden">
                <div class="score-hero">
                    <div class="score-circle">
                        <span id="finalScore" class="score-num">0</span>
                        <span class="score-max">/ 1000</span>
                    </div>
                    <div class="metrics">
                        <div class="metric-box">
                            <span class="label">AVG ROUND SCORE</span>
                            <span id="avgRoundScore" class="val">0.0</span>
                        </div>
                        <div class="metric-box">
                            <span class="label">TOTAL ROUNDS EVALUATED</span>
                            <span id="totalRounds" class="val">0</span>
                        </div>
                    </div>
                </div>

                <h2>ROUND BY ROUND DATA LOGS</h2>
                <div id="roundsLog" class="rounds-log"></div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
